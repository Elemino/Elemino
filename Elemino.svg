<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://w3.org">
  <style>
    @keyframes wave {
      0%, 100% { transform: skewX(0deg) scale(1); }
      50% { transform: skewX(5deg) scale(1.02); }
    }
    .distort {
      animation: wave 3s ease-in-out infinite;
      transform-origin: center;
      font-family: sans-serif;
      font-weight: 900;
      font-size: 80px;
      text-anchor: middle;
    }
  </style>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a7bd5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 3D Shadow -->
  <text x="50%" y="50%" dy=".35em" class="distort" fill="#111" opacity="0.3" style="transform: translate(4px, 4px);">Elemino</text>
  <!-- Main Text -->
  <text x="50%" y="50%" dy=".35em" class="distort" fill="url(#grad)">Elemino</text>
</svg>
