<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <defs>
    <!-- Corrected linear gradient definition -->
    <linearGradient id="b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3a7bd5;stop-opacity:1"/>
    </linearGradient>
    
    <!-- Filter for turbulence effect -->
    <filter id="a">
      <feTurbulence type="fractalNoise" baseFrequency="0.01 0.1" numOctaves="2" result="noise">
        <animate attributeName="baseFrequency" values="0.01 0.1;0.02 0.2;0.01 0.1" dur="3s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="15"/>
    </filter>
  </defs>
  
  <!-- Shadow text -->
  <text x="50%" y="50%" dy=".35em" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="80" fill="#111" filter="url(#a)" opacity=".5" transform="translate(4 4)">Elemino</text>
  
  <!-- Main gradient text -->
  <text x="50%" y="50%" dy=".35em" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="80" fill="url(#b)" filter="url(#a)">Elemino</text>
</svg>
